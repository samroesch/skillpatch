name: Nightly trust score update

on:
  schedule:
    - cron: '0 3 * * *'   # 3am UTC daily
  workflow_dispatch:        # allow manual trigger

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit updated index.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download latest events log from analytics service
        env:
          ANALYTICS_URL: ${{ secrets.ANALYTICS_URL }}
        run: |
          if [ -n "$ANALYTICS_URL" ]; then
            curl -sf "$ANALYTICS_URL/events.log" -o storage/events.log || echo "no events log yet"
          else
            echo "ANALYTICS_URL not set — using existing events.log"
          fi

      - name: Compute trust scores
        run: go run scripts/compute_scores.go

      - name: Commit updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/index.json
          git diff --staged --quiet || git commit -m "chore: update trust scores [skip ci]"
          git push
